<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
<script type="application/javascript">

    fetch('data/data.json')
        .then((response) => {
            return response.json();
        })
        .then((data) => {
            loopData(data)
        });

    function loopData(item) {
        console.log(item)
        for (let i = 0; i < item.length; i++) {
            $('.flex-group').append(
                    '<div class="flex-item">'+
                       ' <div class="flex-img">'+
                            '<img src="'+item[i].img+'" alt="" width="100%">'+
                        '</div>'+
                       ' <div class="flex-text">'+
                            '<h1>'+item[i].name+'</h1>'+
                            '<h1>'+item[i].price+'</h1>'+
                        '</div>'+
                    '</div>'

            )
        }
    }

</script>
